services:
  mysql:
    image: mysql:8.4
    container_name: cart-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: cartdb
      MYSQL_USER: cart
      MYSQL_PASSWORD: cartpass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10

  cart:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cart-ms
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8084:8084"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8084/cart/openapi"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
